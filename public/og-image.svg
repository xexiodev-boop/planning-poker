<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f3f1e9"/>
  <rect width="1200" height="12" fill="#1c6b4d"/>

  <!-- Brand lockup -->
  <g transform="translate(90,96)">
    <path d="M28 0 H72 A28 28 0 0 1 100 28 V72 A28 28 0 0 1 72 100 H10 A10 10 0 0 1 0 90 V28 A28 28 0 0 1 28 0 Z" fill="#17251e"/>
    <text x="50" y="52" fill="#f8f7f0" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-2" text-anchor="middle" dominant-baseline="central">P</text>
    <text x="128" y="52" fill="#17251e" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="40" font-weight="800" letter-spacing="-1" dominant-baseline="central">Point Taken</text>
  </g>

  <!-- Headline -->
  <text x="90" y="330" fill="#17251e" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="70" font-weight="800" letter-spacing="-2">Find the estimate your</text>
  <text x="90" y="412" fill="#17251e" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="70" font-weight="800" letter-spacing="-2">team can stand behind.</text>

  <!-- Subhead -->
