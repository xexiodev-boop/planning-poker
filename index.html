<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Homepage default; the SPA fallback serves this document on every
         route, so src/lib/canonical.js corrects (or removes) this tag per
         route before render. -->
    <link rel="canonical" href="https://pointtaken.team/" />
    <meta name="theme-color" content="#1c6b4d" />
    <meta
      name="description"
      content="Free planning poker for agile teams — no sign-up, no ads, no tracking. Open a room, invite your team, and agree on an estimate in real time."
    />

    <!-- Installable / home-screen pinning. The manifest drives Android + desktop
         installs; the apple-touch-icon and apple-mobile-* tags cover iOS Safari's
         "Add to Home Screen", which does not read the manifest for its icon. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Point Taken" />

    <!-- Social sharing (Open Graph + Twitter). Absolute URLs so older unfurlers
         (Slack, Teams, WhatsApp) that don't resolve root-relative paths still
         render the card. Keep these in sync with the canonical domain. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Point Taken" />
    <meta property="og:url" content="https://pointtaken.team/" />
    <meta property="og:title" content="Point Taken — Free Planning Poker, No Sign-Up" />
    <meta
      property="og:description"
      content="Find the estimate your team can stand behind. Live voting, custom decks, no accounts, no tracking."
    />
    <meta property="og:image" content="https://pointtaken.team/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Point Taken — planning poker without the ceremony" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Point Taken — Free Planning Poker, No Sign-Up" />
    <meta
      name="twitter:description"
      content="Find the estimate your team can stand behind. Live voting, custom decks, no accounts, no tracking."
    />
    <meta name="twitter:image" content="https://pointtaken.team/og-image.png" />

    <!-- Rich result hint for search engines. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Point Taken",
        "url": "https://pointtaken.team/",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Any (web browser)",
        "description": "Free planning poker for agile teams — no sign-up, no ads, no tracking. Real-time story-point estimation.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "xexio.dev", "url": "https://xexio.dev" }
      }
    </script>

    <title>Point Taken — Free Planning Poker, No Sign-Up</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
